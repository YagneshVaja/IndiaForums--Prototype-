name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: TypeScript
        run: npm run tsc
      - name: Tests
        run: npx jest --ci
      - name: Lint
        run: npm run lint
        continue-on-error: true  # remove once we've cleaned up lint warnings
